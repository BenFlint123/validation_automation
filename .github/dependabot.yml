version: 2
updates:
  # GitHub Actions used in workflows under .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-minor-and-patch:
        update-types: ["minor", "patch"]

  # Python dependencies declared in pyproject.toml (uv-compatible).
  # Dependabot reads pyproject.toml + uv.lock and opens PRs that bump versions.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "python"
    groups:
      python-minor-and-patch:
        update-types: ["minor", "patch"]

  # Hooks pinned in .pre-commit-config.yaml
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "pre-commit"
