name: 🐛 Bug report
description: Report a defect, regression, or unexpected behaviour in validation_automation.
title: "fix: <short description of the bug>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        Before opening, please:
        - Search [existing issues](../issues) to avoid duplicates.
        - Check [`CONTRIBUTING.md`](../blob/master/CONTRIBUTING.md) for the project's conventions.
        - **Security vulnerabilities:** do **not** open a public issue. Follow the process in [`SECURITY.md`](../blob/master/SECURITY.md).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
      placeholder: Importing `validation_automation` raises an unexpected error after `uv sync`.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, self-contained steps. A code snippet is ideal.
      placeholder: |
        1. `uv sync --all-groups`
        2. Run the following:
           ```python
           import validation_automation
           ```
        3. Observe ...
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: The import should succeed.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include full tracebacks where relevant.
      placeholder: |
        ```
        KeyError: 'example'
        ```
      render: markdown
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: validation_automation version / commit
      description: Output of `python -c "import validation_automation; print(validation_automation.__version__)"` or commit SHA.
      placeholder: 0.1.0 (commit abc1234)
    validations:
      required: true

  - type: dropdown
    id: python-version
    attributes:
      label: Python version
      options:
        - "3.11"
        - "3.12"
        - other (specify in environment)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - Linux
        - macOS
        - other (specify in environment)
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Additional environment details
      description: Anything else relevant — `uv --version`, dependency versions, container runtime, etc.
      placeholder: uv 0.9.26, running inside a VDI.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true
        - label: I am running the latest released version (or a recent commit on `main`).
          required: true
        - label: This is **not** a security vulnerability (those go through `SECURITY.md`).
          required: true
