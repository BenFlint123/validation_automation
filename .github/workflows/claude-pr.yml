name: Claude PR Automation

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  claude:
    # Only runs when someone comments @claude on a PR (not on plain issues).
    if: contains(github.event.comment.body, '@claude') && github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Run Claude
        uses: anthropics/claude-code-action@4633baf5267540f3f8cb58b684f79901d564c280 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            A user has commented on PR #${{ github.event.issue.number }}:

            "${{ github.event.comment.body }}"

            First read .github/copilot-instructions.md for project context.

            Carry out whatever the user has asked. Common tasks:

            - Code review: submit a formal GitHub review using `gh pr review` with inline
              comments and a summary body. Use `--request-changes` if there are issues to
              address, `--approve` if the code is good, or `--comment` for observations only.
              Focus on Python best practices, Pythonic structures, SOLID principles, and OOP
              fundamentals. Be educational — for teachable moments give a step-by-step plan
              with examples rather than large code blocks to copy. For small fixes, just
              provide the solution directly.

            - PR description: read .github/pull_request_template.md and the PR diff, fill
              in every template section based on the actual changes, leave Submission
              Checklist items unchecked, then run:
              gh pr edit ${{ github.event.issue.number }} --body "<description>"

            The PR branch is already checked out.
          claude_args: >-
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr edit:*),Bash(cat:*)"
